<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcobaleno Levanzo - Ordine</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #d32f2f;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .add-btn-container {
            display: flex;
            gap: 10px;
        }
        button.add-btn {
            background-color: #0288d1;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
        }
        button.add-btn:active { background-color: #0277bd; }
        
        /* අලුතින් කෑම එකතු කරන කොටුවට අදාල ඩිසයින් එක */
        .admin-box {
            background: #fff3e0;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 2px dashed #ff9800;
        }
        button.add-menu-btn {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            white-space: nowrap;
        }
        button.add-menu-btn:active { background-color: #f57c00; }

        .order-list-box {
            background: #e9ecef;
            padding: 10px;
            border-radius: 5px;
            min-height: 50px;
            margin-bottom: 20px;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            border-left: 4px solid #4caf50;
        }
        .remove-btn {
            color: red;
            cursor: pointer;
            font-weight: bold;
        }
        button.submit-btn {
            width: 100%;
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        button.submit-btn:active { background-color: #388e3c; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Arcobaleno Levanzo</h2>
        
        <!-- අලුතින් මෙනුවට කෑම ඇඩ් කරන කොටුව -->
        <div class="admin-box">
            <label for="newMenuItem">Aggiungi nuovo piatto al menu:</label>
            <div class="add-btn-container">
                <input type="text" id="newMenuItem" placeholder="Es: Pasta al Pesto">
                <button type="button" class="add-menu-btn" onclick="addNewItemToDropdown()">Aggiungi</button>
            </div>
        </div>

        <!-- මේස අංකය -->
        <div class="form-group">
            <label for="tableNo">Numero del Tavolo:</label>
            <input type="number" id="tableNo" placeholder="Es: 5" required>
        </div>

        <!-- කෑම තෝරන Dropdown එක -->
        <div class="form-group">
            <label for="menuSelect">Seleziona dal Menu:</label>
            <div class="add-btn-container">
                <select id="menuSelect">
                    <option value="Pizza Margherita">Pizza Margherita</option>
                    <option value="Seafood Pasta">Seafood Pasta</option>
                    <option value="Coca Cola">Coca Cola</option>
                </select>
                <button type="button" class="add-btn" onclick="addItemToOrder()">Aggiungi</button>
            </div>
        </div>

        <!-- තෝරගත්ත කෑම වැටෙන ලිස්ට් එක -->
        <label>Il tuo ordine:</label>
        <div class="order-list-box" id="orderList">
            <!-- Add කරපු දේවල් මෙතන පෙනෙයි -->
        </div>

        <button type="button" class="submit-btn" id="sendBtn">Invia Ordine</button>
    </div>

    <!-- Firebase සහ Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ඔයා දීපු Firebase Config එක හරියටම මෙතන තියෙනවා
        const firebaseConfig = {
            apiKey: "AIzaSyAU-BBKQTtpJB9_wWjvAXDA1RwIFxy24BI",
            authDomain: "arcobaleno-c7be3.firebaseapp.com",
            projectId: "arcobaleno-c7be3",
            storageBucket: "arcobaleno-c7be3.firebasestorage.app",
            messagingSenderId: "488963340684",
            appId: "1:488963340684:web:74d3a0b0d69609fa5e7ea9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // අලුත් කෑම Dropdown එකට දාන ෆන්ක්ෂන් එක
        window.addNewItemToDropdown = function() {
            let inputField = document.getElementById('newMenuItem');
            let newItemVal = inputField.value.trim();
            
            if(newItemVal === "") {
                alert("Inserisci il nome del piatto! (කෑම එකේ නම ගහන්න)");
                return;
            }

            let select = document.getElementById('menuSelect');
            let option = document.createElement("option");
            option.text = newItemVal;
            option.value = newItemVal;
            select.add(option);
            
            inputField.value = ""; // ගහපු නම මකනවා ආයේ ගහන්න ලේසි වෙන්න
            alert("'" + newItemVal + "' aggiunto al menu!");
        }

        let selectedItems = [];

        window.addItemToOrder = function() {
            let menuSelect = document.getElementById('menuSelect');
            let itemVal = menuSelect.value;
            if(!itemVal) return;
            
            selectedItems.push(itemVal);
            updateOrderListUI();
        }

        window.removeItem = function(index) {
            selectedItems.splice(index, 1);
            updateOrderListUI();
        }

        function updateOrderListUI() {
            let listDiv = document.getElementById('orderList');
            listDiv.innerHTML = "";

            if(selectedItems.length === 0) {
                listDiv.innerHTML = "<span style='color:#777;'>Nessun articolo selezionato...</span>";
                return;
            }

            selectedItems.forEach((item, index) => {
                listDiv.innerHTML += `
                    <div class="order-item">
                        <span>${item}</span>
                        <span class="remove-btn" onclick="removeItem(${index})">X</span>
                    </div>
                `;
            });
        }

        updateOrderListUI();

        document.getElementById('sendBtn').addEventListener('click', async () => {
            let tableNo = document.getElementById('tableNo').value;
            
            if(!tableNo) {
                alert("Inserisci il numero del tavolo! (මේස අංකය ඇතුලත් කරන්න)");
                return;
            }
            if(selectedItems.length === 0) {
                alert("Aggiungi almeno un piatto! (කෑමක් ඇඩ් කරන්න)");
                return;
            }

            try {
                document.getElementById('sendBtn').innerText = "Invio in corso...";
                
                await addDoc(collection(db, "orders"), {
                    table: tableNo,
                    items: selectedItems,
                    timestamp: serverTimestamp(),
                    status: "new"
                });
                
                alert("Ordine inviato con successo! (ඕඩර් එක ගියා!)");
                window.location.reload(); 
            } catch (error) {
                alert("Errore: " + error.message);
                document.getElementById('sendBtn').innerText = "Invia Ordine";
            }
        });
    </script>
</body>
</html>
