<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcobaleno - Cucina</title>
    <style>
        body { font-family: sans-serif; background: #212121; color: white; padding: 20px; margin: 0; }
        h2 { text-align: center; color: #ffeb3b; border-bottom: 2px solid #444; padding-bottom: 10px; }
        .orders-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }
        .order-card { background: white; color: #333; padding: 15px; border-radius: 8px; width: 300px; border-top: 5px solid #d32f2f; }
        .table-number { font-size: 24px; font-weight: bold; color: #d32f2f; margin-bottom: 5px; }
        .waiter-name { font-size: 14px; color: #555; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .items-list { font-size: 18px; margin-bottom: 20px; min-height: 80px; }
        .item { margin-bottom: 8px; background: #f1f1f1; padding: 5px; border-radius: 4px; }
        .done-btn { width: 100%; background-color: #4caf50; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Ordini in Cucina (Live)</h2>
    <div class="orders-container" id="ordersDiv"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAU-BBKQTtpJB9_wWjvAXDA1RwIFxy24BI",
            authDomain: "arcobaleno-c7be3.firebaseapp.com",
            projectId: "arcobaleno-c7be3",
            storageBucket: "arcobaleno-c7be3.firebasestorage.app",
            messagingSenderId: "488963340684",
            appId: "1:488963340684:web:74d3a0b0d69609fa5e7ea9"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "asc")), (snapshot) => {
            let html = "";
            snapshot.forEach((docSnap) => {
                let order = docSnap.data();
                if(order.status !== "new") return; // අලුත් ඕඩර්ස් විතරක් පෙන්නන්න
                
                let itemsHtml = order.items.map(item => `<div class="item">✔ ${item}</div>`).join('');
                html += `
                <div class="order-card">
                    <div class="table-number">Tavolo: ${order.table}</div>
                    <div class="waiter-name">Cameriere: ${order.waiter || "N/A"}</div>
                    <div class="items-list">${itemsHtml}</div>
                    <button class="done-btn" onclick="markAsDone('${docSnap.id}')">Fatto (නිම කළා)</button>
                </div>`;
            });
            document.getElementById('ordersDiv').innerHTML = html || "<div style='text-align:center;width:100%;'>Nessun ordine...</div>";
        });

        window.markAsDone = async function(id) {
            if(confirm("Finito? (ඉවරද?)")) {
                await updateDoc(doc(db, "orders", id), { status: "done" });
            }
        }
    </script>
</body>
</html>
